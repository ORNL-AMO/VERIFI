@let _selectedFacility = selectedFacility();
@let _facilityStatusCheck = facilityStatusCheck();

<div class="facility banner d-flex justify-content-between w-100 pb-0 hide-print">
  <div class="d-flex w-100">
    <div class="banner-title ellipsis">
      <span class="fa fa-industry"></span>
      {{_selectedFacility?.name}}
    </div>
    <div class="flex-fill" #navTabs [ngClass]="{'hide-tab-text': hideTabText, 'hide-all-text': hideAllText}">
      <ul class="nav nav-tabs">
        <li class="nav-item" title="Facility Home">
          <a class="nav-link" routerLink="home" [routerLinkActive]="['active']"><i class="fa fa-home"></i>
            <span class="nav-text">
              Home
            </span>
          </a>
        </li>
        <li class="nav-item" title="Facility Utility Data Management">
          <a class="nav-link" routerLink="utility" [routerLinkActive]="['active']"><i class="fa fa-book"></i>
            <span class="nav-text">
              Utility
              Data
              @if(hasUtilityDataWarning()){
              <i class="fa fa-exclamation-triangle"></i>
              }
            </span>
          </a>
        </li>
        <li class="nav-item" title="Facility Data Overview"
          [ngClass]="{'disabled': _facilityStatusCheck?.hasNoMeterData}">
          <a class="nav-link" routerLink="overview" [routerLinkActive]="['active']"><i class="fa fa-chart-column"></i>
            <span class="nav-text">
              Overview
            </span>
          </a>
        </li>
        <li class="nav-item" title="Facility Data Visualization"
          [ngClass]="{'disabled': _facilityStatusCheck?.hasNoMeterData}">
          <a class="nav-link" routerLink="visualization" [routerLinkActive]="['active']"><i
              class="fa fa-chart-line"></i>
            <span class="nav-text">
              Data Visualization
            </span>
          </a>
        </li>
        <li class="nav-item" title="Facility Analysis" [ngClass]="{'disabled': _facilityStatusCheck?.hasNoMeterData}">
          <a class="nav-link" routerLink="analysis" [routerLinkActive]="['active']"><i class="fa fa-microscope"></i>
            <span class="nav-text">
              Analysis
              @if(hasAnalysisWarning()){
              <i class="fa fa-exclamation-triangle"></i>
              }
            </span>
          </a>
        </li>
        <li class="nav-item" title="Facility Reports" [ngClass]="{'disabled': _facilityStatusCheck?.hasNoMeterData}">
          <a class="nav-link" routerLink="reports" [routerLinkActive]="['active']"><i class="fa fa-folder"></i>
            <span class="nav-text">
              Reports
            </span>
          </a>
        </li>
        <li class="nav-item" title="Facility Settings">
          <a class="nav-link" routerLink="settings" [routerLinkActive]="['active']"><i class="fa fa-cog"></i>
            <span class="nav-text">
              Settings
            </span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
