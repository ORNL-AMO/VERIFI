<div class="data-management-content">
    <div class="row g-0 justify-content-center h-100 w-100 overflow-auto">
        <div class="col-11 pt-4 pb-4">
            <div class="form-paper">
                <h4>
                    <div class="d-flex w-100 justify-content-between align-items-center">
                        <div class="h4 mt-auto mb-0">
                            {{energyUseGroup()?.name}} Footprint
                        </div>
                        <div class="d-flex">
                            <button class="btn action-btn" (click)="goToFacilityFootprint()">
                                <span class="fa fa-paw"></span>
                                View Facility Footprint
                            </button>
                        </div>

                        <!-- <div class="d-flex">
                            <div class="d-flex">
                                <label class="switch" for="dataType">
                                    <input class="checkbox" type="checkbox" id="dataType"
                                        [(ngModel)]="dataTypeMeterGroup" name="dataType">
                                    <span class="slider round"></span>
                                </label>
                                <div class="ps-1 my-auto">
                                    Show by Meter Group
                                </div>
                            </div>
                        </div> -->
                    </div>
                </h4>
                @let energyFootprintAnnualGroupBalance = energyFootprintAnnualGroupBalance$();
                @if(!energyFootprintAnnualGroupBalance) {
                <p>Calculating footprint...</p>
                } @else {
                <app-facility-energy-uses-group-sankey
                    [energyFootprintAnnualGroupBalance]="energyFootprintAnnualGroupBalance"></app-facility-energy-uses-group-sankey>
                <hr>
                <app-facility-energy-uses-group-footprint-table
                    [energyFootprintAnnualGroupBalance]="energyFootprintAnnualGroupBalance"></app-facility-energy-uses-group-footprint-table>
                }
            </div>
