<div id="header" role="header" *ngIf="activeAccount">
    <div class="row resetmargin">
        <div class="col-lg-2">
            <h2>VERIFI</h2>
        </div>
        <div class="col">
            <div class="searchBar">
                <i class="fa fa-search"></i>
                <input type="text" ng-model="searchBox" placeholder="Search Verifi">
            </div>
        </div>
        <div class="col-lg-3 facilityMenu">
            <div class="facilityMenu">
                <div class="currentFacility" (click)="toggleFacilityMenu()">
                    <i class="fa fa-industry item-left"></i>
                    <span>{{activeAccount.name}}</span>
                    <p *ngIf="!activeFacility">All Facilites <i class="fa fa-caret-down"></i></p>
                    <p *ngIf="activeFacility">{{activeFacility.name}} <i class="fa fa-caret-down"></i></p>
                </div>
                <div class="dropdown" [class.open]="facilityMenu == true">
                    <div class="arrow-up"></div>
                    <div class="facilities">
                        <p class="small">Switch Facility</p>
                        <p (click)="selectAllFacilities()">
                            All Facilities
                        </p>
                        <div *ngFor="let facility of facilityList">
                            <p (click)="switchFacility(facility)" routerLink="/facility-summary">{{facility.name}}</p>
                            <div class="quick-links">
                                <i class="fa fa-cog item-right" (click)="switchFacility(facility)" routerLink="/facility-management" title="Manage Facility Settings"></i>
                                <i class="fa fa-random item-right" (click)="switchFacility(facility)" title="Switch Facility"></i>
                            </div>
                        </div>
                    </div>
                    <!--<hr>
                    <button class="btn btn-link" (click)="addNewFacility()"><i class="fa fa-plus"></i> Add New Facility</button>-->
                </div>
            </div>

            <div class="accountMenu">
                <i class="fa fa-ellipsis-v" (click)="toggleAccountMenu()"></i>
                <div class="dropdown" [class.open]="accountMenu == true">
                    <div class="arrow-up"></div>
                    <div class="currentAccount" routerLink="/account-management">
                        <i class="fa fa-user-circle-o item-left"></i>
                        <p>{{activeAccount.name}}</p>
                        <span class="small">Manage Account</span>
                        <!--<i class="fa fa-random right"></i>-->
                        <i class="fa fa-chevron-right right"></i>
                    </div>
                    <hr>
                    <a (click)="toggleSwitchAccountsMenu()">Switch Account</a>
                    <br>
                    <a routerLink="/">Settings</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="switchAccounts" [class.open]="switchAccountMenu == true">
    <h5>Switch Account</h5>
    <div class="accounts" *ngIf="activeAccount">
        <div class="account" [class.active]="activeAccount.id === account.id" (click)="switchAccount(account)"
            *ngFor="let account of accountList">
            <!--<i class="fa fa-user-circle-o item-left"></i>-->
            <p class="company item-left">{{account.name}}</p>
            <p class="facilityCount item-right">{{account.facilityCount}}</p>
        </div>
    </div>

    <br>
    <button class="btn btn-link" (click)="addNewAccount()"><i class="fa fa-plus"></i> Add Account</button>
</div>
<div id="darkoverlay" [class.open]="switchAccountMenu == true" (click)="toggleSwitchAccountsMenu()"></div>


<div id="devtools" (click)="devtools = !devtools" [class.open]="devtools">
    <p>Dev Tools</p>
    <button class="btn btn-secondary" (click)="loadTestData();">Load Test Accounts</button><br>
    <button class="btn btn-secondary" (click)="getAllAccounts();">Get All Accounts</button> |
    <button class="btn btn-secondary" (click)="getAllFacilities();">Get All Facilities</button><br>
    <button class="btn btn-secondary" (click)="getAllMeters();">Get All Meters</button> |
    <button class="btn btn-secondary" (click)="getAllMeterData();">Get All Meter Data</button><br>
    <button class="btn btn-secondary" (click)="getAllMeterData();">Get All Meter Groups</button><br>
    <button class="btn btn-secondary" (click)="clearLocalstorage();">Clear localstorage</button><br>
    <button class="btn btn-secondary" (click)="accountdbService.deleteDatabase();">Delete Database</button>
</div>
