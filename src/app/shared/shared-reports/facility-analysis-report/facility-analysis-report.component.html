@if (calculating != false) {
  <div class="report">
    <app-calculating-spinner [message]="'Calculating Annual Results...'"
    [error]="calculating == 'error'"></app-calculating-spinner>
  </div>
}


@if (calculating == false) {
  <div class="w-100" [ngClass]="{'quick-report': inQuickReport}">
    <!--annual facility-->
    @if (analysisReportSettings.facilityAnnualResults) {
      <app-annual-facility-analysis-report [analysisItem]="analysisItem"
        [annualAnalysisSummaries]="annualAnalysisSummaries" [facility]="facility" [groupSummaries]="groupSummaries"
      [analysisReportSettings]="analysisReportSettings"></app-annual-facility-analysis-report>
      <div class="report-spacer-container">
        <hr>
        </div>
      }
      <!--monthly facility-->
      @if (analysisReportSettings.facilityMonthlyResults) {
        <app-monthly-facility-analysis-report [analysisItem]="analysisItem" [facility]="facility"
          [monthlyAnalysisSummaryData]="monthlyAnalysisSummaryData" [groupSummaries]="groupSummaries"
        [analysisReportSettings]="analysisReportSettings"></app-monthly-facility-analysis-report>
        <div class="report-spacer-container">
          <hr>
          </div>
        }
        <!--group reports-->
        @if (analysisReportSettings.groupReports) {
          @for (groupSummary of groupSummaries; track groupSummary; let i = $index) {
            <app-group-analysis-report [groupSummary]="groupSummary" [analysisItem]="analysisItem" [facility]="facility"
            [analysisReportSettings]="analysisReportSettings" [isFirstGroup]="i === 0"></app-group-analysis-report>
            <div class="report-spacer-container">
              <hr>
              </div>
            }
          }
        </div>
      }
