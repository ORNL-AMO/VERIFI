<div class="sticky-top banner-border" [ngClass]="{'modal-open': modalOpen}">
  <div class="utility banner d-flex justify-content-between">
    <div class="flex-fill" #navTabs [ngClass]="{'hide-tab-text': hideTabText, 'hide-all-text': hideAllText}">
      <ul class="nav nav-tabs">
        <li class="nav-item">
          <a class="nav-link" routerLink="energy" [routerLinkActive]="['active']">
            <i class="fa fa-plug"></i>
            <span class="nav-text">
              Energy</span>
          </a>
        </li>
        @if (showWater) {
        <li class="nav-item">
          <a class="nav-link" routerLink="water" [routerLinkActive]="['active']">
            <i class="fa fa-droplet"></i>
            <span class="nav-text">
              Water
            </span>
          </a>
        </li>
        }
        <li class="nav-item">
          <a class="nav-link" routerLink="costs" [routerLinkActive]="['active']">
            <i class="fa fa-dollar"></i>
            <span class="nav-text">
              Costs</span>
          </a>
        </li>
        <!-- <li class="nav-item">
          <a class="nav-link" routerLink="emissions" [routerLinkActive]="['active']">
            <i class="fa fa-smog"></i>
            <span class="nav-text">
              Emissions</span>
          </a>
        </li> -->
      </ul>
    </div>
    <app-facility-overview-options></app-facility-overview-options>
    <button class="btn action-btn ms-1" (click)="openCreateReportModal()"><span class="fa fa-file"></span>
      Create
      Report</button>
  </div>
</div>



<div [ngClass]="{'windowOverlay': showReportModal}"></div>
<div class="popup" [ngClass]="{'open': showReportModal}">
  <div class="popup-header">Create New Data Overview Report
    <button class="item-right" (click)="cancelCreateReport()">x</button>
  </div>
  <div class="popup-body">
    @if (facilityReport) {
    <form>
      <label class="semibold larger">Sections to Include in Report</label>
      <div class="section-options">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" name="includeEnergySection" id="includeEnergySection"
            [(ngModel)]="facilityReport.dataOverviewReportSettings.includeEnergySection">
          <label class="form-check-label" for="includeEnergySection">Energy Use</label>
        </div>
        <div class="form-check">
          <input type="checkbox" class="form-check-input" name="includeCostsSection" id="includeCostsSection"
            [(ngModel)]="facilityReport.dataOverviewReportSettings.includeCostsSection">
          <label class="form-check-label" for="includeCostsSection">Costs</label>
        </div>
        <div class="form-check">
          <input type="checkbox" class="form-check-input" name="includeEmissionsSection" id="includeEmissionsSection"
            [(ngModel)]="facilityReport.dataOverviewReportSettings.includeEmissionsSection">
          <label class="form-check-label" for="includeEmissionsSection">Emissions</label>
        </div>
        @if (showWater) {
        <div class="form-check">
          <input type="checkbox" class="form-check-input" name="includeWaterSection" id="includeWaterSection"
            [(ngModel)]="facilityReport.dataOverviewReportSettings.includeWaterSection">
          <label class="form-check-label" for="includeWaterSection">Water</label>
        </div>
        }
      </div>
    </form>
    }
  </div>
  <div class="popup-footer text-end">
    <button class="btn btn-secondary" (click)="cancelCreateReport()">Cancel</button>
    <button class="btn btn-primary" (click)="createReport()">Create Report</button>
  </div>
</div>
