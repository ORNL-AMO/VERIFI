<h4>{{energyUseEquipment.name}}</h4>

<div class="d-flex w-100 justify-content-end">
    <div>
        <button class="btn btn-primary me-2" (click)="saveChanges()" [disabled]="form.invalid || form.pristine">
            <span class="fa fa-save"></span>
            Save Changes</button>
    </div>
</div>
<!--FORM-->
<form [formGroup]="form">
    <div class="row">
        <div class="col-12">
            <p class="bold">Equipment / System Information</p>
            <div class="form-group row">
                <label class="col-5 col-form-label" for="equipmentName">Name</label>
                <div class="col-7">
                    <input id="equipmentName" class="form-control" type="text" formControlName="name"
                        onfocus="this.select();" minlength="0" maxlength="100">
                    <div class="alert alert-danger mt-1" *ngIf="form.get('name').hasError('required')">Name is
                        required</div>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-5 col-form-label" for="energySource">Energy Source</label>
                <div class="col-7">
                    <select id="energySource" class="form-select" formControlName="energySource">
                        <option *ngFor="let sourceOption of sourceOptions" [ngValue]="sourceOption">
                            {{sourceOption}}
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-5 col-form-label" for="size">Total Size/Capacity</label>
                <div class="col-7">
                    <input id="size" class="form-control" type="number" formControlName="size" onfocus="this.select();"
                        min="0">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-5 col-form-label" for="units">Units</label>
                <div class="col-7">
                    <input id="units" class="form-control" type="text" formControlName="units" onfocus="this.select();"
                        minlength="0" maxlength="50">
                </div>
            </div>
        </div>
    </div>
</form>

<hr>
<div class="d-flex w-100 justify-content-end">
    <div>
        <button class="btn btn-danger btn-sm" (click)="showDelete()">
            <span class="fa fa-trash"></span>
            Delete Equipment
        </button>
    </div>
</div>

<div [ngClass]="{'windowOverlay': showDeleteEquipment}"></div>
<div class="popup" [class.open]="showDeleteEquipment">
    <div class="popup-header" *ngIf="showDeleteEquipment">Delete Equipment: {{energyUseEquipment.name}}
        <button class="item-right" (click)="cancelDelete()">x</button>
    </div>
    <div class="popup-body">
        <p>WARNING: By deleting this equipment, you are also deleting all of the equipment data associated with
            it.
            Are you sure you want to preform this action?</p>
    </div>
    <div class="saveCancel popup-footer text-end">
        <button class="btn btn-secondary" (click)="cancelDelete()">Cancel</button>
        <button class="btn btn-danger" (click)="deleteEquipment()">Delete</button>
    </div>
</div>
