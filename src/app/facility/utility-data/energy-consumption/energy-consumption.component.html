<div class="wrapper main-content p-0">
    <div class="banner p-0">
        <ul class="nav nav-tabs">
            <li class="nav-item"><a class="nav-link" routerLink="energy-source" [routerLinkActive]="['active']">
                    <i class="fa fa-gauge-high"></i>
                    Meters</a></li>
            <li class="nav-item" *ngFor="let meter of utilityMeters"><a class="nav-link"
                    routerLink="utility-meter/{{meter.id}}" [routerLinkActive]="['active']">
                    <i class="fa fa-file-invoice"></i>
                    {{meter.name}}</a></li>
        </ul>
    </div>
    <div class="content-padding">
        <router-outlet></router-outlet>
    </div>
</div>



<div [ngClass]="{'windowOverlay': dataQualityModalOpen}"></div>
<div class="popup" [class.open]="dataQualityModalOpen">
    <div class="popup-header">Data Quality Report
        <button class="item-right" (click)="closeDataQualityModal()">x</button>
    </div>
    <div class="popup-body">
        <app-data-quality-check></app-data-quality-check>
    </div>
</div>
