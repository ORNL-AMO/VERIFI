<form>
  <div class="row form-group">
    <label class="col-6 col-form-label semibold" for="startYear">Start Year</label>
    <div class="col-6">
      <select name="startYear" [(ngModel)]="reportSettings.startYear" class="form-select" (change)="save()"
        [required]="true">
        @for (year of baselineYears; track year) {
        <option class="pe-2" [ngValue]="year">{{year}}
        </option>
        }
      </select>
    </div>
  </div>
  <div class="row form-group">
    <label class="col-6 col-form-label semibold" for="endYear">End Year</label>
    <div class="col-6">
      <select name="endYear" [(ngModel)]="reportSettings.endYear" class="form-select" (change)="save()"
        [required]="true">
        @for (year of reportYears; track year) {
        <option class="pe-2" [ngValue]="year">{{year}}
        </option>
        }
      </select>
    </div>
  </div>
  @let reportErrors = facilityReport | invalidFacilityReport;
  @if (reportErrors.invalidDateRange) {
  <div class="row justify-content-end">
    <span class="col-6 alert alert-danger small mt-2">
      Start year cannot be later than the end year
    </span>
  </div>
  }
  <hr>
</form>
