<form [formGroup]="utilityDataForm">
    <div class="form-group row mt-2">
        <div class="d-flex w-100 justify-content-between">
            <div>
                <label class="col-12 col-form-label">
                    <span class="badge me-1 larger"
                        [ngStyle]="{'background-color': energySource | meterSourceColor}">{{energySource}}
                        Data</span>
                </label>
            </div>
            <div>
                <button type="button" class="btn-close" aria-label="Close" (click)="removeUtilityType()"></button>
            </div>
        </div>
    </div>
    <div class="form-group row">
        <label class="col-5 col-form-label" for="size_{{energySource}}">
            {{ equipmentDetailsForm.get('equipmentType').value | sizeLabel }}
        </label>
        <div class="col-7 ">
            <div class="input-group">
                <input id="size_{{energySource}}" class="form-control" type="number" formControlName="size"
                    onfocus="this.select();" min="0">
                <select class="input-group-text" id="units_{{energySource}}" name="units" formControlName="units">
                    <option *ngFor="let option of (energySource | equipmentUnitOptions )" [ngValue]="option.value">
                        <span [innerHTML]="option.value | settingsLabel"></span>
                    </option>
                </select>
            </div>
        </div>
    </div>
    <div class="form-group row">
        <label class="col-5 col-form-label" for="numberOfEquipment_{{energySource}}">Number of
            Equipment</label>
        <div class="col-7">
            <input id="numberOfEquipment_{{energySource}}" class="form-control" type="number"
                formControlName="numberOfEquipment" onfocus="this.select();" min="0">
        </div>
    </div>
</form>
@if(!inSetup){
<div class="mt-3 mb-2">
    <p class="bold">Energy Use Data</p>
</div>
<div class="row">
    <label class="col-5 bold">Year</label>
    <label class="col-7 bold">Energy Use</label>
</div>
@for(energyUseForm of energyUseForms | orderEquipmentEnergyUseForms; track energyUseForm) {
<form [formGroup]="energyUseForm">
    <div class="row">
        <label class="col-5 col-form-label">
            {{energyUseForm.controls.year.value}}
        </label>
        <div class="col-7">
            <div class="input-group">
                <button class="btn action-btn input-group-text" (click)="toggleOverride(energyUseForm)">
                    @if(energyUseForm.controls.overrideEnergyUse.value){
                    <span class="fa fa-calculator"></span>
                    }@else {
                    <span class="fa fa-pencil"></span>
                    }
                </button>
                <input class="form-control" type="number" formControlName="energyUse" id="energyUse" min="0">
                <span class="input-group-text">
                    <!--TODO: Units-->
                    ??
                </span>
            </div>
        </div>
    </div>
</form>
}
}
