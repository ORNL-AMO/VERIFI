<div class="account banner d-flex justify-content-between w-100 pb-0 hide-print">
    <div class="d-flex w-100">
        <div class="banner-title ellipsis">
            <span class="fa fa-building"></span>
            {{selectedAccount.name}}
        </div>

        <div class="flex-fill" #navTabs [ngClass]="{'hide-tab-text': hideTabText, 'hide-all-text': hideAllText}">
            <ul class="nav nav-tabs">
                <li class="nav-item" title="Account Home">
                    <a class="nav-link" routerLink="home" [routerLinkActive]="['active']"><i class="fa fa-home"></i>
                        <span class="nav-text">
                            Home
                        </span>
                    </a>
                </li>
                <li class="nav-item" title="Account Overview" [ngClass]="{'disabled': meterData.length == 0}">
                    <a class="nav-link" routerLink="overview" [routerLinkActive]="['active']"><i
                            class="fa fa-chart-column"></i>
                        <span class="nav-text">
                            Overview
                        </span>
                    </a>
                </li>
                <li class="nav-item" title="Account Analysis" [ngClass]="{'disabled': meterData.length == 0}">
                    <a class="nav-link" routerLink="analysis" [routerLinkActive]="['active']"><i
                            class="fa fa-microscope"></i>
                        <span class="nav-text">
                            Analysis
                        </span>
                    </a>
                </li>
                <li class="nav-item" title="Account Reports" [ngClass]="{'disabled': meterData.length == 0}">
                    <a class="nav-link" routerLink="reports" [routerLinkActive]="['active']"><i
                            class="fa fa-folder"></i>
                        <span class="nav-text">
                            Reports
                        </span>
                    </a>
                </li>
                <li class="nav-item" title="Account Settings">
                    <a class="nav-link" routerLink="settings" [routerLinkActive]="['active']"><i class="fa fa-cog"></i>
                        <span class="nav-text">
                            Settings
                        </span>
                    </a>
                </li>
                <li class="nav-item" title="Account Custom Data">
                    <a class="nav-link" routerLink="custom-data" [routerLinkActive]="['active']"><i
                            class="fa fa-smog"></i>
                        <span class="nav-text">
                            Custom Data
                        </span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
