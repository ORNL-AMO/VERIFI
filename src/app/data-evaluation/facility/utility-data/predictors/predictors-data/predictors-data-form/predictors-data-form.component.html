<div class="row">
  <div class="col-12">
    <div class="saveCancel item-right">
      <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
      @if (addOrEdit == 'edit') {
        <button class="btn btn-primary" (click)="saveAndQuit()"
        [disabled]="calculatingDegreeDays">Save</button>
      }
      @if (addOrEdit == 'add') {
        <button class="btn btn-primary me-2" (click)="saveAndQuit()"
        [disabled]="calculatingDegreeDays">Save + Quit</button>
      }
      @if (addOrEdit == 'add') {
        <button class="btn btn-primary" (click)="saveAndAddAnother()"
          [disabled]="calculatingDegreeDays">Save +
        Add Another</button>
      }
    </div>
  </div>
</div>
<app-edit-predictor-data-entry-form (isSaved)="onSavedChanges($event)" [predictor]="predictor"
[predictorData]="predictorData" [calculatingDegreeDays]="calculatingDegreeDays"></app-edit-predictor-data-entry-form>
