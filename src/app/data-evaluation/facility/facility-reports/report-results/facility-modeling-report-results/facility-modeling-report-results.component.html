@if (facilityReport && facilityDetails) {
  @if (facilityReport.modelingReportSettings.includeIssuesSummary) {
    <div class="report" >
        <app-analysis-problems-information [facilityDetails]="facilityDetails" [executiveSummaryItems]="executiveSummaryItems" [isFacilityReport]="true"></app-analysis-problems-information>
    </div>
  }

  @if (facilityReport.modelingReportSettings.includeExecutiveSummary) {
    <div class="report">
        <app-analysis-facility-report [facilityDetails]="facilityDetails" [executiveSummaryItems]="executiveSummaryItems" [isFacilityReport]="true"></app-analysis-facility-report>
    </div>
  }

  @if (facilityReport.modelingReportSettings.includeDataValidationTables) {
    <div class="report">
      <app-analysis-data-validation-tables [facilityDetails]="facilityDetails" [executiveSummaryItems]="executiveSummaryItems" [isFacilityReport]="true"></app-analysis-data-validation-tables>
    </div>
  }
}

@if (!analysisItem) {
  <div class="w-100 justify-content-center">
    <div class="pt-5">
      <app-calculating-spinner [message]="'Generating Modeling Report...'"></app-calculating-spinner>
    </div>
  </div>
}
