<div class="wrapper main-content p-0">
  <div class="banner p-0">
    <ul class="nav nav-tabs">
      <li class="nav-item"><a class="nav-link" routerLink="energy-source" [routerLinkActive]="['active']">
        <i class="fa fa-gauge-high"></i>
      Meters</a></li>
      @for (meter of utilityMeters; track meter) {
        <li class="nav-item">
          <a class="nav-link" routerLink="utility-meter/{{meter.guid}}" [routerLinkActive]="['active']">
            <i class="fa fa-file-invoice"></i>
            {{meter.name}}
            @if (meter.guid | invalidMeter: meterData) {
              <i class="fa fa-exclamation-circle"></i>
            }
          </a>
        </li>
      }
    </ul>
  </div>
  <div class="content-padding">
    <router-outlet></router-outlet>
  </div>
</div>
