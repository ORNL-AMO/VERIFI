<div class="table-responsive">
  <!--energy use-->
  @if (dataType == 'energyUse') {
    <app-energy-consumption-table [dateRange]="dateRange" [facilityId]="facilityId"
      [energyUnit]="energyUnit" [sourcesUseAndCost]="sourcesUseAndCost" [useAndCostTotal]="useAndCostTotal"
    [previousYear]="previousYear"></app-energy-consumption-table>
  }
  <!--emissions-->
  @if (dataType == 'emissions') {
    <app-emissions-consumption-table [dateRange]="dateRange" [facilityId]="facilityId"
    [useAndCostTotal]="useAndCostTotal" [previousYear]="previousYear"></app-emissions-consumption-table>
  }

  <!--costs-->
  @if (dataType == 'cost') {
    <app-costs-consumption-table [dateRange]="dateRange" [facilityId]="facilityId"
      [sourcesUseAndCost]="sourcesUseAndCost" [useAndCostTotal]="useAndCostTotal"
    [previousYear]="previousYear"></app-costs-consumption-table>
  }

  <!--water-->
  @if (dataType == 'water') {
    <app-water-consumption-table [dateRange]="dateRange" [facilityId]="facilityId"
      [sourcesUseAndCost]="sourcesUseAndCost" [useAndCostTotal]="useAndCostTotal" [previousYear]="previousYear"
    [waterUnit]="waterUnit"></app-water-consumption-table>
  }
</div>
