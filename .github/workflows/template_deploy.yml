name: "Template: Deploy"

on:
  workflow_call:
    inputs:
      app-dir:
        required: true
        type: string
      artifact-name:
        required: true
        type: string
      backup-dir:
        required: false
        type: string
      deploy-dir:
        required: true
        type: string
      tag:
        required: true
        type: string

jobs:
  deploy:
    runs-on:
      - self-hosted
      - ${{ inputs.tag }}
    steps:
      - name: Get artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
      - name: Deploy
        run: |
          ls -lah
