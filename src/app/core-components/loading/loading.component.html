<div id="loading" [class.open]="loading">
    <img class="loading" src="assets/images/Ripple-2s-84px-fff.gif">
    <div class="loading_message" [hidden]="!loading">{{loadingMessage}}</div>
</div>

<div id="loading-info" [class.open]="loadingList && loadingMessages?.length > 0">
    <div class="fw-bold title-style mb-3" *ngIf="title">{{ title }}</div>
    <div class="p-4 bg-white rounded message-container">
        <div *ngFor="let message of loadingMessages; let i = index" class="d-flex align-items-center mb-3">
            <ng-container *ngIf="i < currentLoadingIndex || loadingComplete">
                <i class="fa fa-check-circle text-success me-2 icon-style"></i>
            </ng-container>
            <ng-container *ngIf="i === currentLoadingIndex && !loadingComplete">
                <i class="fa fa-spinner fa-spin text-primary me-2 icon-style"></i>
            </ng-container>
            <span class="fw-bold message-text">{{ message }}</span>
        </div>
    </div>

    <div class="d-flex justify-content-end">
        <button class="btn btn-primary mt-4 text" [disabled]="!loadingComplete" (click)="onClose()">Done</button>
    </div>
</div>

<div [ngClass]="{'windowOverlay': loading || loadingList}"></div>
