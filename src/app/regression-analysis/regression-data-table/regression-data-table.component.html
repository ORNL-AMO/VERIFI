<table class="table table-responsive" *ngIf="regressionTableRows">
    <thead>
        <tr>
            <th>
                Date
            </th>
            <th *ngFor="let rowData of regressionTableRows[0].data">
                {{rowData.label}}
            </th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let regressionTableRow of regressionTableRows;">
            <td>
                {{regressionTableRow.date |  date: 'MMM, y'}}
            </td>
            <td *ngFor="let rowData of regressionTableRow.data">
                {{rowData.value | number:'1.0-2'}}
            </td>
        </tr>
    </tbody>
</table>
