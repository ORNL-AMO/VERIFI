<div class="container-fluid p-0 m-0">
  <div class="d-flex flex-column h-100">
    <div #header>
      <app-header class="hide-print" [dataInitialized]="dataInitialized"></app-header>
    </div>
    <div class="d-flex overflow-hidden flex-grow-1">
      @if (dataInitialized) {
        <div class="content w-100" role="main" [ngClass]="{'data-management': inDataManagement}">
          <router-outlet></router-outlet>
          <app-import-backup-modal class="hide-print"></app-import-backup-modal>
          <app-create-report-modal class="hide-print"></app-create-report-modal>
          <app-toast-notifications class="hide-print"></app-toast-notifications>
          <app-deleting-account-data class="hide-print"></app-deleting-account-data>
        </div>
      }
      @if (!dataInitialized) {
        <div class="content w-100">
          <div class="loading-screen">
            <div class="spinner">
              <div class="bounce1"></div>
              <div class="bounce2"></div>
              <div class="bounce3"></div>
            </div>
            <h1>{{loadingMessage}}</h1>
          </div>
        </div>
      }
    </div>
    <app-loading class="hide-print"></app-loading>
    <app-electron-update class="hide-print"></app-electron-update>
    <app-electron-backup-file class="hide-print"></app-electron-backup-file>
    @if (showSurveyModal) {
      <app-survey-modal class="hide-print" ></app-survey-modal>
    }
    @if (showSurveyToast) {
      <app-survey-toast class="hide-print"></app-survey-toast>
    }
  </div>
</div>
