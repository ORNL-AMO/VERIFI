<div class="container py-4">
	<div class="row mb-4">
		<div class="col-12 col-md-10 mx-auto text-center bg-white">
			<h1 class="display-4 mb-2">VERIFI Algorithm Documentation</h1>
			<p class="lead text-secondary">
				Explore detailed documentation for all major calculation and reporting algorithms in VERIFI. Click a card to view the full documentation.
			</p>
		</div>
	</div>
	<div class="row row-cols-1 row-cols-md-2 row-cols-lg-2 g-4 justify-content-center">
		<div class="col" *ngFor="let doc of docs">
			<div class="card h-100 shadow-sm border-primary">
				<div class="card-body">
					<h5 class="card-title">
						<a [routerLink]="doc.link" class="stretched-link text-decoration-none text-primary fw-bold">{{ doc.title }}</a>
					</h5>
					<p class="card-text text-secondary small">{{ doc.description }}</p>
				</div>
			</div>
		</div>
	</div>
</div>
