<div class="utility banner sticky-top d-flex justify-content-between" [ngClass]="{'modal-open': modalOpen}">
  <ul class="nav nav-tabs">
    <li class="nav-item">
      <a class="nav-link" routerLink="energy-consumption" [routerLinkActive]="['active']">
        <i class="fa fa-file-pen"></i>
        Meter Management
        <!-- @if (metersHaveErrors) {
          <i class="fa fa-exclamation-circle"></i>
        } -->
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="monthly-meter-data" [routerLinkActive]="['active']">
        <i class="fa fa-calendar-days"></i>
      Monthly Data</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="meter-groups" [routerLinkActive]="['active']">
        <i class="fa fa-layer-group"></i>
      Analysis Groups</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="predictors" [routerLinkActive]="['active']">
        <i class="fa fa-boxes-stacked"></i>
        Predictors
        @if (predictorsNeedUpdate) {
          <i class="fa fa-exclamation-triangle weather-update"></i>
        }
      </a>
    </li>
  </ul>
  <div>
    <button class="btn action-btn m-0" (click)="openExportModal()" title="Export Data"><span
    class="fa fa-download"></span></button>
  </div>
</div>

<div [ngClass]="{'windowOverlay': showExportModal}">
</div>

<div class="popup" [class.open]="showExportModal">
  <div class="popup-header">Export Facility: {{facility?.name}}
    <button class="item-right" (click)="closeExportModal()">x</button>
  </div>
  <div class="popup-body">
    <div class="form-check mt-3 checkbox-style">
      <input class="form-check-input" type="checkbox" value="" id="includeWeatherData" [(ngModel)]="includeWeatherData">
      <label class="form-check-label ms-2" for="includeWeatherData">
        Include weather data in export
      </label>
    </div>
    <div class="popup-footer text-end mt-4">
      <button class="btn btn-secondary" (click)="closeExportModal()">Cancel</button>
      <button class="btn btn-success" (click)="exportData()">Export</button>
    </div>
  </div>
</div>
