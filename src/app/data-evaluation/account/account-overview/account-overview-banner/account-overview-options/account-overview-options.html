<div class="dropdown ms-auto">
    <button class="btn action-btn dropdown-toggle italic" data-bs-toggle="dropdown" aria-expanded="false"
        data-bs-display="static">
        <span class="fa fa-sliders"></span>
        Options
    </button>
    <ul class="dropdown-menu dropdown-menu-end p-3">
        @if(minMonth != undefined){
        <li>
            <label class="bold">Date Range Start</label>
            <select name="minMonth" [(ngModel)]="minMonth" class="form-select" (change)="setDate()">
                @for (month of months; track month) {
                <option class="pe-2" [ngValue]="month.monthNumValue">
                    {{month.abbreviation}}</option>
                }
            </select>
            <select name="minYear" [(ngModel)]="minYear" class="form-select" (change)="setDate()">
                @for (year of years; track year) {
                <option class="pe-2" [ngValue]="year">{{year}}</option>
                }
            </select>
        </li>
        <li>
            <label class="bold">Date Range End</label>
            <select name="maxMonth" [(ngModel)]="maxMonth" class="form-select" (change)="setDate()">
                @for (month of months; track month) {
                <option class="pe-2" [ngValue]="month.monthNumValue">
                    {{month.abbreviation}}</option>
                }
            </select>
            <select name="maxYear" [(ngModel)]="maxYear" class="form-select" (change)="setDate()">
                @for (year of years; track year) {
                <option class="pe-2" [ngValue]="year">{{year}}</option>
                }
            </select>
        </li>
        @if(errorMessage){
        <li>
            <span class="text-danger">{{errorMessage}}</span>
        </li>
        }
        }
        <li>
            <hr class="dropdown-divider">
        </li>
        <li>
            <label class="bold">Site/Source Energy</label>
            <div class="form-check">
                <input type="radio" class="form-check-input" name="energyIsSource" [value]="true" id="sourceEnergy"
                    [(ngModel)]="selectedAccount.energyIsSource" (change)="setAccountEnergyIsSource()">
                <label class="form-check-label" for="sourceEnergy">Source Energy</label>
            </div>
            <div class="form-check">
                <input type="radio" class="form-check-input" name="energyIsSource" [value]="false" id="siteEnergy"
                    [(ngModel)]="selectedAccount.energyIsSource" (change)="setAccountEnergyIsSource()">
                <label class="form-check-label" for="siteEnergy">Site Energy</label>
            </div>
        </li>
        <li>
            <hr class="dropdown-divider">
        </li>
        <li>
            <label class="bold">Emissions Display</label>
            <div class="form-check">
                <input type="radio" class="form-check-input" name="emissionsDisplay" [value]="'location'" id="location"
                    [(ngModel)]="emissionsDisplay" (change)="setEmissions()">
                <label class="form-check-label" for="location">Location</label>
            </div>
            <div class="form-check">
                <input type="radio" class="form-check-input" name="emissionsDisplay" [value]="'market'" id="market"
                    [(ngModel)]="emissionsDisplay" (change)="setEmissions()">
                <label class="form-check-label" for="market">Market</label>
            </div>
        </li>
    </ul>
</div>
