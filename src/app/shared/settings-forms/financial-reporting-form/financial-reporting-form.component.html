<form [formGroup]="form">
  <app-label-with-tooltip [label]="'When is your fiscal year?'" [field]="'financialReportingFiscalYear'"
    [isBold]="true">
  </app-label-with-tooltip>
  <div class="form-check">
    <input type="radio" class="form-check-input" name="fiscalYear" formControlName="fiscalYear" value="calendarYear"
      (change)="saveChanges()" id="calendarYear">
    <label class="form-check-label" for="calendarYear">Calendar Year</label>
  </div>
  <div class="form-check">
    <input type="radio" class="form-check-input" name="fiscalYear" formControlName="fiscalYear" value="nonCalendarYear"
      (change)="saveChanges()" id="nonCalendarYear">
    <label class="form-check-label" for="nonCalendarYear">Non Calendar Year</label>
  </div>

  @if (form.controls.fiscalYear.value === 'nonCalendarYear') {
  <div class="row">
    <div class="col-lg-12 mb-3">
      <label for="fiscalYearMonth">Start Month</label>
      <select class="form-select" formControlName="fiscalYearMonth" (change)="saveChanges()">
        @for (month of months; track month) {
        <option [ngValue]="month.monthNumValue">{{month.name}}
        </option>
        }
      </select>
    </div>
    <div class="col-lg-12 mb-3">
      <div class="form-check">
        <input type="checkbox" class="form-check-input" name="fiscalYearCalendarEnd"
          formControlName="fiscalYearCalendarEnd" (change)="saveChanges()" id="fiscalYearCalendarEnd">
        <app-label-with-tooltip [label]="'Our FY is denoted by the calendar year in which it ends'"
          [field]="'fiscalYearCalendarEnd'"
          [labelId]="'fiscalYearCalendarEnd'">
        </app-label-with-tooltip>
      </div>
    </div>
  </div>
  }
</form>
