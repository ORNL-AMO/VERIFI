<div class="sticky-top banner-border" [ngClass]="{'modal-open': modalOpen}">
  <div class="utility banner d-flex justify-content-between">
    <div class="flex-fill" #navTabs [ngClass]="{'hide-tab-text': hideTabText, 'hide-all-text': hideAllText}">
      <ul class="nav nav-tabs">
        <li class="nav-item">
          <a class="nav-link" routerLink="energy" [routerLinkActive]="['active']">
            <i class="fa fa-plug"></i>
            <span class="nav-text">
              Energy
            </span>
          </a>
        </li>
        @if (showWater) {
        <li class="nav-item">
          <a class="nav-link" routerLink="water" [routerLinkActive]="['active']">
            <i class="fa fa-droplet"></i>
            <span class="nav-text">
              Water
            </span>
          </a>
        </li>
        }
        <li class="nav-item">
          <a class="nav-link" routerLink="costs" [routerLinkActive]="['active']">
            <i class="fa fa-dollar"></i>
            <span class="nav-text">
              Costs
            </span>
          </a>
        </li>
        @if(selectedAccount.displayEmissions){
        <li class="nav-item">
          <a class="nav-link" routerLink="emissions" [routerLinkActive]="['active']">
            <i class="fa fa-smog"></i>
            <span class="nav-text">
              Emissions
            </span>
          </a>
        </li>
        }
      </ul>
    </div>
    <app-account-overview-options></app-account-overview-options>
    <button class="btn action-btn ms-1" (click)="createReport()"><span class="fa fa-file"></span> Create
      Report</button>
  </div>
</div>
