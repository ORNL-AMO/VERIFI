
<app-account-report-analysis-selection [reportForm]="analysisReportForm"></app-account-report-analysis-selection>

@if(selectedAnalysisItem) {
<form [formGroup]="analysisReportForm">
  <div class="row">
    <div class="col-4">
      <label class="semibold">Sections to Include In the Report</label>
      <div class="form-check">
        <input type="checkbox" class="form-check-input" name="includeProblemsInformation"
          id="includeProblemsInformation" formControlName="includeProblemsInformation" (change)="save()">
        <label class="form-check-label" for="includeProblemsInformation">Issues Summary</label>
      </div>
      <div class="form-check">
        <input type="checkbox" class="form-check-input" name="includeExecutiveSummary" id="includeExecutiveSummary"
          formControlName="includeExecutiveSummary" (change)="save()">
        <label class="form-check-label" for="includeExecutiveSummary">Executive Summary</label>
      </div>
      <div class="form-check">
        <input type="checkbox" class="form-check-input" name="includeDataValidationTables"
          id="includeDataValidationTables" formControlName="includeDataValidationTables" (change)="save()">
        <label class="form-check-label" for="includeDataValidationTables">Data Validation Tables</label>
      </div>
    </div>
  </div>
</form>
}
