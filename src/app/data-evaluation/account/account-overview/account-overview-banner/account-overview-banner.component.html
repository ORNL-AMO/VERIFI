<div class="sticky-top banner-border" [ngClass]="{'modal-open': modalOpen}">
  <div class="utility banner d-flex justify-content-between">
    <ul class="nav nav-tabs">
      <li class="nav-item">
        <a class="nav-link" routerLink="energy" [routerLinkActive]="['active']">
          <i class="fa fa-plug"></i>
        Energy</a>
      </li>
      @if (showWater) {
        <li class="nav-item">
          <a class="nav-link" routerLink="water" [routerLinkActive]="['active']">
            <i class="fa fa-droplet"></i>
          Water</a>
        </li>
      }
      <!-- <li class="nav-item">
      <a class="nav-link" routerLink="other" [routerLinkActive]="['active']">
        <i class="fa fa-file-pen"></i>
      Other</a>
    </li> -->
    <li class="nav-item">
      <a class="nav-link" routerLink="costs" [routerLinkActive]="['active']">
        <i class="fa fa-dollar"></i>
      Costs</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="emissions" [routerLinkActive]="['active']">
        <i class="fa fa-smog"></i>
      Emissions</a>
    </li>
  </ul>

  @if (minMonth != undefined) {
    <div class="d-flex">
      <div class="d-flex flex-column">
        <div class="d-flex mb-1">
          <div class="pe-1">
            <select name="minMonth" [(ngModel)]="minMonth" class="form-select" (change)="setDate()">
              @for (month of months; track month) {
                <option class="pe-2" [ngValue]="month.monthNumValue">
                {{month.abbreviation}}</option>
              }
            </select>
          </div>
          <div class="pe-1">
            <select name="minYear" [(ngModel)]="minYear" class="form-select" (change)="setDate()">
              @for (year of years; track year) {
                <option class="pe-2" [ngValue]="year">{{year}}</option>
              }
            </select>
          </div>
          <div class="ps-1 pe-1">
            <span class="fa fa-arrow-right"></span>
          </div>
          <div class="pe-1">
            <select name="maxMonth" [(ngModel)]="maxMonth" class="form-select" (change)="setDate()">
              @for (month of months; track month) {
                <option class="pe-2" [ngValue]="month.monthNumValue">
                {{month.abbreviation}}</option>
              }
            </select>
          </div>
          <div class="pe-1">
            <select name="maxYear" [(ngModel)]="maxYear" class="form-select" (change)="setDate()">
              @for (year of years; track year) {
                <option class="pe-2" [ngValue]="year">{{year}}</option>
              }
            </select>
          </div>
        </div>
        @if (errorMessage) {
          <div class="text-danger fw-bold">
            {{errorMessage}}
          </div>
        }
      </div>
      <div class="pe-1">
        <button class="btn action-btn btn-sm" (click)="createReport()" [disabled]="errorMessage"><span class="fa fa-file"></span> Create
      Report</button>
    </div>
    @if (urlDisplay == 'energy') {
      <div class="pe-1">
        <div class="btn-group">
          <button class="btn btn-sm m-0 toggle-btn" (click)="setAccountEnergyIsSource(true)"
            [ngClass]="{'active': selectedAccount.energyIsSource == true}">
            <span class="fa fa-chevron-right"></span>
            Source Energy
            <span class="fa fa-chevron-left"></span>
          </button>
          <button class="btn btn-sm toggle-btn m-0" (click)="setAccountEnergyIsSource(false)"
            [ngClass]="{'active': selectedAccount.energyIsSource == false}">
            <span class="fa fa-chevron-right"></span>
            Site Energy
            <span class="fa fa-chevron-left"></span>
          </button>
        </div>
      </div>
    }
    @if (urlDisplay == 'emissions') {
      <div class="ps-1">
        <div class="btn-group">
          <button class="btn btn-sm m-0 toggle-btn" (click)="setEmissions('location')"
            [ngClass]="{'active': emissionsDisplay == 'location'}">
            <span class="fa fa-chevron-right"></span>
            Location
            <span class="fa fa-chevron-left"></span>
          </button>
          <button class="btn btn-sm toggle-btn m-0" (click)="setEmissions('market')"
            [ngClass]="{'active': emissionsDisplay == 'market'}">
            <span class="fa fa-chevron-right"></span>
            Market
            <span class="fa fa-chevron-left"></span>
          </button>
        </div>
      </div>
    }
  </div>
}
</div>
</div>
