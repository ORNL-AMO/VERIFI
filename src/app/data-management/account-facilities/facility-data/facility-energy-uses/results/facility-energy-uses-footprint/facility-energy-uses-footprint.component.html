<div class="data-management-content">
    <div class="row g-0 justify-content-center h-100 w-100 overflow-auto">
        <div class="col-11 pt-4 pb-4">
            <div class="form-paper">
                <h4>
                    <div class="d-flex w-100 justify-content-between align-items-center">
                        <div class="h4 mt-auto mb-0">
                            {{selectedFacility$()?.name}} Energy Use Footprint
                        </div>
                        <div class="d-flex">
                            <label class="switch ms-auto" for="includeInEnergy">
                                <input class="checkbox" type="checkbox" id="includeInEnergy"
                                    [(ngModel)]="displayDataByGroup">
                                <span class="slider round"></span>
                            </label>
                            <div class="ps-2 my-auto fw-bold">
                                Show Result By Group
                            </div>
                        </div>
                    </div>
                </h4>

                <select class="form-select" [(ngModel)]="selectedYear">
                    @for(year of yearOptions(); track year) {
                    <option [ngValue]="year">{{year}}</option>
                    }
                </select>
                @let energyFootprintAnnualFacilityBalance = energyFootprintAnnualFacilityBalance$();
                @if(!energyFootprintAnnualFacilityBalance) {
                <p>Calculating footprint...</p>
                } @else {
                <app-facility-energy-uses-sankey
                    [energyFootprintAnnualFacilityBalance]="energyFootprintAnnualFacilityBalance" [displayDataByGroup]="displayDataByGroup()"></app-facility-energy-uses-sankey>
                }
                <!-- @if(energyFootprintFacility){
                @let dataType = dataTypeMeterGroup ? 'meterGroup' : 'source';
                <app-facility-energy-uses-footprint-table [energyFootprintFacility]="energyFootprintFacility"
                    [facility]="facility" [tableType]="dataType"></app-facility-energy-uses-footprint-table>
                <hr>
                <div class="row justify-content-center">
                    @if(dataType == 'source'){
                    @for(sourceResults of energyFootprintFacility.includedSourcesAnnualResults; track $index){
                    <div class="col-12">
                        <app-facility-energy-uses-footprint-chart [energyFootprintFacility]="energyFootprintFacility"
                            [facility]="facility" [chartType]="dataType"
                            [source]="sourceResults.source"></app-facility-energy-uses-footprint-chart>
                    </div>
                    @if($index < energyFootprintFacility.includedSourcesAnnualResults.length - 1){ <hr>
                        }
                        }
                        }@else {

                        @for(groupResult of energyFootprintFacility.meterGroupsAnnualResults; track $index){
                        <div class="col-12">
                            <app-facility-energy-uses-footprint-chart
                                [energyFootprintFacility]="energyFootprintFacility" [facility]="facility"
                                [chartType]="dataType"
                                [groupId]="groupResult.meterGroupId"></app-facility-energy-uses-footprint-chart>
                        </div>
                        @if($index < energyFootprintFacility.meterGroupsAnnualResults.length - 1){ <hr>
                            }
                            }
                            }

                </div>
                }@else{
                <!--TODO: Message with link to manage energy use groups--
                <p>No energy use data available.</p>
                } -->
            </div>
        </div>
    </div>
</div>
