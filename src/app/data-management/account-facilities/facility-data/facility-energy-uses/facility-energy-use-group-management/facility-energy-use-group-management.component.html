<h4>
    {{facility.name}} Energy Use Groups
</h4>
@if(facilityEnergyUseGroups.length > 0){
    <div class="d-flex w-100 justify-content-end mb-2">
        <app-table-items-dropdown></app-table-items-dropdown>
        <!-- <div class="ps-2">
            <button class="btn nav-btn" (click)="uploadData()"><i class="fa fa-upload"></i> Import Data</button>
        </div> -->
        <div class="ps-2">
            <button class="btn action-btn" (click)="addGroup()"><i class="fa fa-plus"></i> Add
                New Group</button>
        </div>


    </div>
} @else {
<div class="text-center mt-5">
    <h5>No energy use groups found for this facility.</h5>
    <p>Please <i class="fa fa-plus"></i> Add New Group.</p>
    <div class="d-flex w-100 justify-content-center">
        <div class="pe-1">
            <button class="btn action-btn" (click)="addGroup()"><i class="fa fa-plus"></i> Add New Group</button>
        </div>
        <!-- <div class="ps-1">
            <button class="btn nav-btn" (click)="uploadData()"><i class="fa fa-upload"></i> Import Data</button>
        </div> -->
    </div>
</div>
}
