<div class="plot-content">
  <h4>
    Data Correlation
  </h4>

  @for (combination of axisCombinations; track combination) {
    <div class="row justify-content-center">
      @for (xOption of combination.xOptions; track xOption) {
        <div class="col-lg-6 col-md-12">
          <app-correlation-plot-graph-item [axisCombo]="{x: xOption, y: combination.y}"></app-correlation-plot-graph-item>
        </div>
      }
      <div class="col-12">
        <hr>
        </div>
      </div>
    }
  </div>
