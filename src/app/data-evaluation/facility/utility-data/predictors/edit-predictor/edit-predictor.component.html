@if (predictorForm) {
  <div class="row">
    <div class="col-12 justify-content-end">
      @if (predictorForm.controls.predictorType.value == 'Weather' && addOrEdit == 'edit') {
        <div class="d-flex small text-center alert alert-warning"
          >
          Changing weather data properties will cause predictor data to re-calculate. Existing predictor entries
          may
          be
          altered.
        </div>
      }
      <div class="d-flex justify-content-end">
        <button class="btn btn-secondary me-2" (click)="cancel()">Cancel</button>
        <button class="btn btn-primary" (click)="saveChanges()" [disabled]="predictorForm.invalid">
          @if (addOrEdit == 'add') {
            <span>Add Predictor</span>
          }
          @if (addOrEdit == 'edit') {
            <span>Save Changes</span>
          }
        </button>
      </div>
    </div>
  </div>
  <app-edit-predictor-form [predictorForm]="predictorForm" [predictor]="predictor"
    [latestMeterReading]="latestMeterReading" [firstMeterReading]="firstMeterReading"
  [addOrEdit]="addOrEdit"></app-edit-predictor-form>
}
