<div class="wrapper main-content p-0">
  <div class="banner p-0">
    <ul class="nav nav-tabs">
      <li class="nav-item"><a class="nav-link" routerLink="energy-source" [routerLinkActive]="['active']">
          <i class="fa fa-gauge-high"></i>
          Meters
          @if (facilityStatusCheck()?.metersStatus != 'good') {
        <i class="fa fa-exclamation-triangle text-warning"></i>
          }
        </a>
      </li>
      @for (meterListItem of metersList(); track meterListItem.meter.guid) {
      <li class="nav-item">
        <a class="nav-link" routerLink="utility-meter/{{meterListItem.meter.guid}}" [routerLinkActive]="['active']">
          <i class="fa fa-file-invoice"></i>
          {{meterListItem.meter.name}}
          @if (meterListItem.meterStatusCheck?.status != 'good') {
        <i class="fa fa-exclamation-triangle text-warning"></i>
          }
        </a>
      </li>
      }
    </ul>
  </div>
  <div class="content-padding">
    <router-outlet></router-outlet>
  </div>
</div>
