<form [formGroup]="form">
    <div class="row">
        <div class="col-12">
            <p class="bold">Equipment / System Information</p>
            <div class="form-group row">
                <label class="col-5 col-form-label" for="equipmentName">Name</label>
                <div class="col-7">
                    <input id="equipmentName" class="form-control" type="text" formControlName="name"
                        onfocus="this.select();" minlength="0" maxlength="100">
                    @let nameControl = form.get('name');
                    @if(nameControl.touched && nameControl.hasError('required')){
                    <div class="alert alert-danger mt-1" *ngIf="nameControl.hasError('required')">Name is
                        required</div>
                    }
                </div>
            </div>

            <div class="row">
                <label class="col-sm-5 col-form-label" for="equipmentType">Industrial System</label>
                <div class="col-sm-7">
                    <select name="equipmentType" class="form-select" id="equipmentType" formControlName="equipmentType">
                        <option *ngFor="let option of equipmentTypes" [ngValue]="option">
                            {{option}}
                        </option>
                    </select>
                </div>
            </div>

            <div class="form-group row">
                <label class="col-5 col-form-label" for="energySource">Utility Type</label>
                <div class="col-7">
                    <select id="energySource" class="form-select" formControlName="energySource">
                        <option *ngFor="let sourceOption of (form.get('equipmentType').value | utilityTypeOptions)"
                            [ngValue]="sourceOption">
                            {{sourceOption}}
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-5 col-form-label" for="size">
                    {{ form.get('equipmentType').value | sizeLabel: form.get('energySource').value }}
                </label>
                <div class="col-7">
                    <div class="input-group">
                        <input id="size" class="form-control" type="number" formControlName="size"
                            onfocus="this.select();" min="0">

                        <select class="input-group-text" id="units" name="units" formControlName="units">
                            <option *ngFor="let option of (form.get('energySource').value| equipmentUnitOptions )"
                                [ngValue]="option.value">
                                <span [innerHTML]="option.value | settingsLabel"></span>
                            </option>
                        </select>
                    </div>
                </div>
            </div>
            <!-- <div class="form-group row">
                <label class="col-5 col-form-label" for="units">Units</label>
                <div class="col-7">
                    <input id="units" class="form-control" type="text" formControlName="units" onfocus="this.select();"
                        minlength="0" maxlength="50">
                </div>
            </div> -->
            <div class="form-group row">
                <label class="col-5 col-form-label" for="equipmentNotes">Notes</label>
                <div class="col-7">
                    <textarea id="equipmentNotes" class="form-control" formControlName="notes" onfocus="this.select();"
                        minlength="0" maxlength="500"></textarea>
                </div>
            </div>
        </div>
    </div>
</form>
